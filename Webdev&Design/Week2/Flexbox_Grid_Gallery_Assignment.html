<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="styleSheet" href="css/styleFlexbox_Grid_Gallery.css">
    <title>Flexbox and Grid Gallery Assignment</title>
</head>
<body>
    <div class="flexbox_Container">
        <h2>Flexbox Gallery</h2>
        <div class="flexbox_items">
            <div id="item_1">Item 1</div>
            <div id="item_2">Item 2</div>
            <div id="item_3">Item 3</div>
            <div id="item_4">Item 4</div>
            <div id="item_5">Item 5</div>
            <div id="item_6">Item 6</div>
        </div>
    </div>
    <div class="gridbox_Container">
        <h2>Grid Gallery</h2>
        <div class="gridbox_Items">
            <div id="first_Item">Item 1</div>
            <div id="second_Item">Item 2</div>
            <div id="third_Item">Item 3</div>
            <div id="fourth_Item">Item 4</div>
            <div id="fifth_Item">Item 5</div>
            <div id="sixth_Item">Item 6</div>
        </div>
    </div>
</body>
</html>
